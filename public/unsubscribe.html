<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe - Legal Spectrum</title>
    <meta name="description" content="Unsubscribe from Legal Spectrum updates.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f1b24">
    <link rel="icon" type="image/svg+xml" href="/uploads/img/legal-specturm.svg">
    <link rel="apple-touch-icon" href="/uploads/img/Legal-specturm-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/unsubscribe.css">

</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <header>
        <div class="container nav-container">
            <a href="/" class="logo">
                <img src="/uploads/img/Legal-specturm-logo.png" alt="Legal Spectrum logo">
                <span>Legal Spectrum</span>
            </a>
            <button class="hamburger" type="button" aria-label="Toggle navigation" aria-controls="primary-nav" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav id="primary-nav" aria-label="Primary">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/#practice">Practice Areas</a></li>
                    <li><a href="/blog">Insights</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
                <a class="nav-cta" href="/contact">Book a Consultation</a>
            </nav>
        </div>
    </header>

    <main class="unsubscribe-content" id="main-content">
        <div id="message" class="message" role="status" aria-live="polite">Unsubscribing, please wait...</div>
        <a href="/" class="home-link">Return to Home Page</a>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = new URLSearchParams(window.location.search).get('token');
            const messageEl = document.getElementById('message');

            if (!token) {
                messageEl.textContent = 'Invalid unsubscribe link. Token is missing.';
                messageEl.classList.add('error');
                return;
            }

            try {
                const response = await fetch(`/api/unsubscribe?token=${token}`);
                const result = await response.json();

                messageEl.textContent = result.message || result.error;
                messageEl.classList.add(response.ok ? 'success' : 'error');
            } catch (error) {
                messageEl.textContent = 'An error occurred. Please try again later.';
                messageEl.classList.add('error');
            }
        });
    </script>
    <script src="/js/nav.js"></script>
</body>
</html>
