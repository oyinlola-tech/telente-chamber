<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe - Legal Spectrum</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            color: #000000;
            background-color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
            color: #000000;
            margin-bottom: 2rem;
        }
        #message {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .message.success {
            color: #155724;
        }
        .message.error {
            color: #721c24;
        }
        .home-link {
            color: #000000;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .home-link:hover {
            border-color: #000000;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="logo">Legal Spectrum</a>
        <div id="message" class="message">Unsubscribing, please wait...</div>
        <a href="/" class="home-link">Return to Home Page</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = new URLSearchParams(window.location.search).get('token');
            const messageEl = document.getElementById('message');

            if (!token) {
                messageEl.textContent = 'Invalid unsubscribe link. Token is missing.';
                messageEl.classList.add('error');
                return;
            }

            try {
                const response = await fetch(`/api/unsubscribe?token=${token}`);
                const result = await response.json();

                messageEl.textContent = result.message || result.error;
                messageEl.classList.add(response.ok ? 'success' : 'error');
            } catch (error) {
                messageEl.textContent = 'An error occurred. Please try again later.';
                messageEl.classList.add('error');
            }
        });
    </script>
</body>
</html>
