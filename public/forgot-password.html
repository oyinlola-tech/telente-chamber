<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Legal Spectrum</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            color: #000000;
            background-color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            background-color: #FFFFFF;
            border-bottom: 1px solid #eee;
            padding: 2rem 0;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
            color: #000000;
            display: block;
            text-align: center;
        }
        
        .forgot-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 0;
        }
        
        .forgot-box {
            width: 100%;
            max-width: 500px;
            padding: 3rem;
            border: 1px solid #eee;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        
        .forgot-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .forgot-header h1 {
            font-size: 2rem;
            font-weight: normal;
            margin-bottom: 1rem;
        }
        
        .forgot-header p {
            color: #666;
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 2rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.75rem;
            font-size: 1rem;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 1rem;
            border: 1px solid #ddd;
            font-family: 'Georgia', serif;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
        }
        
        .otp-inputs {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
        }
        
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 4px;
        }
        
        .otp-input:focus {
            border-color: #000000;
            outline: none;
        }
        
        button[type="submit"] {
            width: 100%;
            background: #000000;
            color: #FFFFFF;
            border: 2px solid #000000;
            padding: 1rem;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        button[type="submit"]:hover {
            background: #FFFFFF;
            color: #000000;
        }
        
        button[type="submit"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            display: none;
            text-align: center;
        }
        
        .success {
            background-color: #f0f9f0;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        
        .error {
            background-color: #f8f9fa;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        
        .info {
            background-color: #e7f3ff;
            border: 1px solid #b3d7ff;
            color: #004085;
            display: block;
        }
        
        .timer {
            text-align: center;
            margin: 1rem 0;
            font-size: 1rem;
            color: #666;
        }
        
        .timer.expired {
            color: #721c24;
        }
        
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
        }
        
        .links a {
            color: #000000;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .links a:hover {
            border-color: #000000;
            background-color: #f9f9f9;
        }
        
        footer {
            background-color: #000000;
            color: #FFFFFF;
            padding: 2.5rem 0;
            margin-top: auto;
        }
        
        .copyright {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            gap: 20px;
        }
        
        .step {
            text-align: center;
            position: relative;
            flex: 1;
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            background-color: #ddd;
            color: #666;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .step.active .step-number {
            background-color: #000000;
            color: #FFFFFF;
        }
        
        .step-label {
            font-size: 0.9rem;
            color: #666;
        }
        
        .step.active .step-label {
            color: #000000;
            font-weight: 500;
        }
        
        .resend-link {
            text-align: center;
            margin-top: 1rem;
        }
        
        .resend-link a {
            color: #000000;
            text-decoration: none;
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }
        
        .resend-link a:hover {
            border-bottom-color: #000000;
        }
        
        .resend-link a.disabled {
            color: #999;
            cursor: not-allowed;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .forgot-box {
                max-width: 100%;
                padding: 2rem;
                margin: 0 1rem;
            }
            
            .forgot-header h1 {
                font-size: 1.8rem;
            }
            
            .links {
                flex-direction: column;
                gap: 1rem;
            }
            
            .links a {
                width: 100%;
                text-align: center;
            }
            
            .otp-input {
                width: 40px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message {
            animation: fadeIn 0.3s ease;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Legal Spectrum</a>
        </div>
    </header>

    <main class="forgot-container">
        <div class="container">
            <div class="forgot-box">
                <!-- Step Indicator -->
                <div class="step-indicator">
                    <div class="step active" id="step1">
                        <div class="step-number">1</div>
                        <div class="step-label">Enter Email</div>
                    </div>
                    <div class="step" id="step2">
                        <div class="step-number">2</div>
                        <div class="step-label">Enter OTP</div>
                    </div>
                    <div class="step" id="step3">
                        <div class="step-number">3</div>
                        <div class="step-label">New Password</div>
                    </div>
                </div>
                
                <div class="forgot-header">
                    <h1 id="page-title">Forgot Password</h1>
                    <p id="page-description">Enter your email address to receive a One-Time Password (OTP)</p>
                </div>
                
                <div id="message" class="message"></div>
                
                <!-- Step 1: Email Input -->
                <div id="step1-container">
                    <form id="email-form">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your admin email">
                        </div>
                        
                        <button type="submit" id="send-otp-btn">Send OTP</button>
                    </form>
                </div>
                
                <!-- Step 2: OTP Verification -->
                <div id="step2-container" class="hidden">
                    <div class="timer" id="timer">OTP expires in: <span id="time">10:00</span></div>
                    
                    <form id="otp-form">
                        <div class="form-group">
                            <label>Enter 6-digit OTP</label>
                            <div class="otp-inputs">
                                <input type="text" class="otp-input" maxlength="1" data-index="0">
                                <input type="text" class="otp-input" maxlength="1" data-index="1">
                                <input type="text" class="otp-input" maxlength="1" data-index="2">
                                <input type="text" class="otp-input" maxlength="1" data-index="3">
                                <input type="text" class="otp-input" maxlength="1" data-index="4">
                                <input type="text" class="otp-input" maxlength="1" data-index="5">
                            </div>
                            <input type="hidden" id="otp" name="otp">
                        </div>
                        
                        <button type="submit" id="verify-otp-btn" disabled>Verify OTP</button>
                    </form>
                    
                    <div class="resend-link">
                        <a href="#" id="resend-otp-link">Resend OTP</a>
                        <span id="resend-timer" class="hidden"> (Available in <span id="resend-time">60</span>s)</span>
                    </div>
                </div>
                
                <!-- Step 3: New Password -->
                <div id="step3-container" class="hidden">
                    <form id="password-form">
                        <div class="form-group">
                            <label for="password">New Password</label>
                            <input type="password" id="password" name="password" required 
                                   placeholder="Enter new password (min. 8 characters)">
                            <div id="password-strength" class="timer"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" name="confirmPassword" required 
                                   placeholder="Confirm new password">
                            <div id="password-match" class="timer"></div>
                        </div>
                        
                        <button type="submit" id="reset-password-btn" disabled>Reset Password</button>
                    </form>
                </div>
                
                <div class="links">
                    <a href="/admin/login"> Back to Login</a>
                    <a href="/">Back to Website</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="copyright">
                <p>&copy; 2026 Legal Spectrum. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // State management
        let currentStep = 1;
        let userEmail = '';
        let otp = '';
        let countdownInterval;
        let resendCountdown = 60;
        let resendInterval;
        
        // DOM Elements
        const steps = document.querySelectorAll('.step');
        const step1Container = document.getElementById('step1-container');
        const step2Container = document.getElementById('step2-container');
        const step3Container = document.getElementById('step3-container');
        const pageTitle = document.getElementById('page-title');
        const pageDescription = document.getElementById('page-description');
        const messageDiv = document.getElementById('message');
        const emailForm = document.getElementById('email-form');
        const otpForm = document.getElementById('otp-form');
        const passwordForm = document.getElementById('password-form');
        const otpInputs = document.querySelectorAll('.otp-input');
        const hiddenOtp = document.getElementById('otp');
        const timerElement = document.getElementById('time');
        const resendLink = document.getElementById('resend-otp-link');
        const resendTimer = document.getElementById('resend-timer');
        const resendTime = document.getElementById('resend-time');
        const verifyOtpBtn = document.getElementById('verify-otp-btn');
        const resetPasswordBtn = document.getElementById('reset-password-btn');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const passwordStrength = document.getElementById('password-strength');
        const passwordMatch = document.getElementById('password-match');
        
        // Update steps
        function updateSteps(step) {
            steps.forEach((s, index) => {
                if (index < step) {
                    s.classList.add('active');
                } else {
                    s.classList.remove('active');
                }
            });
            
            // Hide all containers
            step1Container.classList.add('hidden');
            step2Container.classList.add('hidden');
            step3Container.classList.add('hidden');
            
            // Show current container
            if (step === 1) {
                step1Container.classList.remove('hidden');
                pageTitle.textContent = 'Forgot Password';
                pageDescription.textContent = 'Enter your email address to receive a One-Time Password (OTP)';
            } else if (step === 2) {
                step2Container.classList.remove('hidden');
                pageTitle.textContent = 'Verify OTP';
                pageDescription.textContent = 'Enter the 6-digit OTP sent to your email';
                startOTPTimer();
                startResendTimer();
                focusFirstOTPInput();
            } else if (step === 3) {
                step3Container.classList.remove('hidden');
                pageTitle.textContent = 'New Password';
                pageDescription.textContent = 'Create a new password for your account';
            }
            
            currentStep = step;
            clearMessage();
        }
        
        // OTP Input handling
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Allow only numbers
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                // Move to next input if current is filled
                if (e.target.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                
                updateOTPValue();
            });
            
            input.addEventListener('keydown', (e) => {
                // Handle backspace
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
            
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text');
                const numbers = pasteData.replace(/[^0-9]/g, '');
                
                if (numbers.length === 6) {
                    numbers.split('').forEach((num, i) => {
                        if (otpInputs[i]) {
                            otpInputs[i].value = num;
                        }
                    });
                    updateOTPValue();
                    verifyOtpBtn.focus();
                }
            });
        });
        
        function focusFirstOTPInput() {
            setTimeout(() => otpInputs[0].focus(), 100);
        }
        
        function updateOTPValue() {
            otp = Array.from(otpInputs).map(input => input.value).join('');
            hiddenOtp.value = otp;
            verifyOtpBtn.disabled = otp.length !== 6;
        }
        
        // OTP Timer
        function startOTPTimer() {
            let timeLeft = 10 * 60; // 10 minutes in seconds
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    timerElement.parentElement.classList.add('expired');
                    timerElement.textContent = 'OTP expired';
                    verifyOtpBtn.disabled = true;
                }
            }, 1000);
        }
        
        // Resend timer
        function startResendTimer() {
            resendCountdown = 60;
            resendTimer.classList.remove('hidden');
            resendLink.classList.add('disabled');
            
            if (resendInterval) clearInterval(resendInterval);
            
            resendInterval = setInterval(() => {
                resendCountdown--;
                resendTime.textContent = resendCountdown;
                
                if (resendCountdown <= 0) {
                    clearInterval(resendInterval);
                    resendTimer.classList.add('hidden');
                    resendLink.classList.remove('disabled');
                }
            }, 1000);
        }
        
        // Password validation
        function validatePassword() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            // Password strength
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            let strengthText = '';
            let strengthClass = '';
            switch(strength) {
                case 0:
                case 1:
                    strengthText = 'Weak';
                    strengthClass = 'expired';
                    break;
                case 2:
                case 3:
                    strengthText = 'Medium';
                    strengthClass = '';
                    break;
                case 4:
                case 5:
                    strengthText = 'Strong';
                    strengthClass = '';
                    break;
            }
            
            passwordStrength.textContent = `Strength: ${strengthText}`;
            passwordStrength.className = `timer ${strengthClass}`;
            
            // Password match
            if (password && confirmPassword) {
                if (password === confirmPassword) {
                    passwordMatch.textContent = '✓ Passwords match';
                    passwordMatch.className = 'timer';
                } else {
                    passwordMatch.textContent = '✗ Passwords do not match';
                    passwordMatch.className = 'timer expired';
                }
            } else {
                passwordMatch.textContent = '';
            }
            
            // Enable button if conditions met
            const isValid = password.length >= 8 && password === confirmPassword;
            resetPasswordBtn.disabled = !isValid;
        }
        
        passwordInput.addEventListener('input', validatePassword);
        confirmPasswordInput.addEventListener('input', validatePassword);
        
        // Clear message
        function clearMessage() {
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            messageDiv.textContent = '';
        }
        
        // Show message
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
        
        // Step 1: Send OTP
        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const button = document.getElementById('send-otp-btn');
            const originalText = button.textContent;
            
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }
            
            button.textContent = 'Sending...';
            button.disabled = true;
            
            try {
                const response = await fetch('/api/admin/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    userEmail = email;
                    showMessage('OTP sent successfully! Check your email.', 'success');
                    setTimeout(() => updateSteps(2), 1500);
                } else {
                    showMessage(result.error || 'Failed to send OTP', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        });
        
        // Step 2: Verify OTP
        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (otp.length !== 6) {
                showMessage('Please enter a valid 6-digit OTP', 'error');
                return;
            }
            
            const button = document.getElementById('verify-otp-btn');
            const originalText = button.textContent;
            
            button.textContent = 'Verifying...';
            button.disabled = true;
            
            try {
                const response = await fetch('/api/admin/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showMessage('OTP verified successfully!', 'success');
                    setTimeout(() => updateSteps(3), 1500);
                } else {
                    showMessage(result.error || 'Invalid OTP', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        });
        
        // Resend OTP
        resendLink.addEventListener('click', async (e) => {
            e.preventDefault();
            
            if (resendLink.classList.contains('disabled')) return;
            
            const originalText = resendLink.textContent;
            resendLink.textContent = 'Sending...';
            resendLink.classList.add('disabled');
            
            try {
                const response = await fetch('/api/admin/resend-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showMessage('New OTP sent successfully!', 'success');
                    // Clear OTP inputs
                    otpInputs.forEach(input => input.value = '');
                    updateOTPValue();
                    startOTPTimer();
                    startResendTimer();
                    focusFirstOTPInput();
                } else {
                    showMessage(result.error || 'Failed to resend OTP', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                resendLink.textContent = originalText;
            }
        });
        
        // Step 3: Reset Password
        passwordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = passwordInput.value;
            const button = document.getElementById('reset-password-btn');
            const originalText = button.textContent;
            
            button.textContent = 'Resetting...';
            button.disabled = true;
            
            try {
                const response = await fetch('/api/admin/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: userEmail, 
                        otp: otp, 
                        password: password 
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showMessage('Password reset successful! Redirecting to login...', 'success');
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/admin/login';
                    }, 3000);
                } else {
                    showMessage(result.error || 'Failed to reset password', 'error');
                    button.disabled = false;
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                button.textContent = originalText;
                button.disabled = false;
            }
        });
        
        // Initialize
        updateSteps(1);
        
        // Clear message when user starts typing
        document.addEventListener('input', () => {
            if (messageDiv.style.display === 'block') {
                clearMessage();
            }
        });
    </script>
</body>
</html>
