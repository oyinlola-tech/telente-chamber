<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Legal Spectrum</title>
    <meta name="description" content="Reset your Legal Spectrum admin password securely.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f1b24">
    <link rel="icon" type="image/svg+xml" href="/uploads/img/legal-specturm.svg">
    <link rel="apple-touch-icon" href="/uploads/img/Legal-specturm-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">`r`n    <link rel="stylesheet" href="/css/forgot-password.css">
</head>
<body data-page="forgot-password" data-site-url="https://www.legalspectrum.ng" data-org-name="Legal Spectrum" data-org-phone="+2348061234567" data-org-email="hello@legalspectrum.ng" data-org-street="Legal Spectrum Chambers" data-org-locality="Okitipupa" data-org-region="Ondo State" data-org-country="NG">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div data-include="header"></div>

    <main class="forgot-container" id="main-content">
        <div class="container">
            <div class="forgot-box">
                <!-- Step Indicator -->
                <div class="step-indicator">
                    <div class="step active" id="step1">
                        <div class="step-number">1</div>
                        <div class="step-label">Enter Email</div>
                    </div>
                    <div class="step" id="step2">
                        <div class="step-number">2</div>
                        <div class="step-label">Enter OTP</div>
                    </div>
                    <div class="step" id="step3">
                        <div class="step-number">3</div>
                        <div class="step-label">New Password</div>
                    </div>
                </div>
                
                <div class="forgot-header">
                    <h1 id="page-title">Reset Your Password</h1>
                    <p id="page-description">Enter your email and we will send a one-time verification code.</p>
                </div>
                
                <div id="message" class="message" role="status" aria-live="polite"></div>
                
                <!-- Step 1: Email Input -->
                <div id="step1-container">
                    <form id="email-form">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your admin email">
                        </div>
                        
                        <button type="submit" id="send-otp-btn">Send OTP</button>
                    </form>
                </div>
                
                <!-- Step 2: OTP Verification -->
                <div id="step2-container" class="hidden">
                    <div class="timer" id="timer">OTP expires in: <span id="time">10:00</span></div>
                    
                    <form id="otp-form">
                        <div class="form-group">
                            <label>Enter 6-digit OTP</label>
                            <div class="otp-inputs">
                                <input type="text" class="otp-input" maxlength="1" data-index="0">
                                <input type="text" class="otp-input" maxlength="1" data-index="1">
                                <input type="text" class="otp-input" maxlength="1" data-index="2">
                                <input type="text" class="otp-input" maxlength="1" data-index="3">
                                <input type="text" class="otp-input" maxlength="1" data-index="4">
                                <input type="text" class="otp-input" maxlength="1" data-index="5">
                            </div>
                            <input type="hidden" id="otp" name="otp">
                        </div>
                        
                        <button type="submit" id="verify-otp-btn" disabled>Verify OTP</button>
                    </form>
                    
                    <div class="resend-link">
                        <a href="#" id="resend-otp-link">Resend OTP</a>
                        <span id="resend-timer" class="hidden"> (Available in <span id="resend-time">60</span>s)</span>
                    </div>
                </div>
                
                <!-- Step 3: New Password -->
                <div id="step3-container" class="hidden">
                    <form id="password-form">
                        <div class="form-group">
                            <label for="password">New Password</label>
                            <input type="password" id="password" name="password" required 
                                   placeholder="Enter new password (min. 8 characters)">
                            <div id="password-strength" class="timer"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" name="confirmPassword" required 
                                   placeholder="Confirm new password">
                            <div id="password-match" class="timer"></div>
                        </div>
                        
                        <button type="submit" id="reset-password-btn" disabled>Reset Password</button>
                    </form>
                </div>
                
                <div class="links">
                    <a href="/admin/login"> Back to Login</a>
                    <a href="/">Back to Website</a>
                </div>
            </div>
        </div>
    </main>

    <div data-include="footer"></div>

    
    <script src="/js/bundle.js"></script>
</body>
</html>
