<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Legal Spectrum</title>
    <meta name="description" content="Secure Legal Spectrum admin login for managing content and client communications.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f1b24">
    <link rel="icon" type="image/svg+xml" href="/uploads/img/legal-specturm.svg">
    <link rel="apple-touch-icon" href="/uploads/img/Legal-specturm-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <header>
        <div class="container nav-container">
            <a href="/" class="logo">
                <img src="/uploads/img/Legal-specturm-logo.png" alt="Legal Spectrum logo">
                <span>Legal Spectrum</span>
            </a>
            <button class="hamburger" type="button" aria-label="Toggle navigation" aria-controls="primary-nav" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav id="primary-nav" aria-label="Primary">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/#practice">Practice Areas</a></li>
                    <li><a href="/blog">Insights</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
                <a class="nav-cta" href="/contact">Book a Consultation</a>
            </nav>
        </div>
    </header>

    <main class="login-container" id="main-content">
        <div class="container">
            <div class="login-box">
                <div class="login-header">
                    <h1>Admin Login</h1>
                    <p>Access the admin dashboard to manage content</p>
                </div>
                
                <div id="login-message" class="message" role="status" aria-live="polite"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email address">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" required placeholder="Enter your password">
                            <button type="button" class="toggle-password" id="toggle-password">Show</button>
                        </div>
                    </div>
                    
                    <button type="submit" id="login-submit">Sign In</button>
                </form>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/admin/forgot-password" style="color: #000000; text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
                <div class="back-link">
                    <a href="/"> Back to Website</a>
                </div>
            </div>
        </div>
    </div>
    </main>

    <footer>
        <div class="container">
            <div class="copyright">
                <p>&copy; 2026 Legal Spectrum. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Toggle password visibility
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                this.textContent = 'Show';
            }
        });
        
        // Login form handler
        const loginForm = document.getElementById('login-form');
        const loginSubmit = document.getElementById('login-submit');
        const messageDiv = document.getElementById('login-message');
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const originalText = loginSubmit.textContent;
            loginSubmit.textContent = 'Signing in...';
            loginSubmit.disabled = true;
            
            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                

                if(response.status === 401){
                    alert('Incorrect credentials. Please try again.');
                }
                
                const result = await response.json();
                
                console.log('Login response:', { status: response.status, result });
                
                if (response.ok) {
                    messageDiv.textContent = 'Login successful! Redirecting...';
                    messageDiv.className = 'message success';
                    
                    // Store token in localStorage
                    if (result.token) {
                        localStorage.setItem('admin_token', result.token);
                        console.log('Token stored in localStorage');
                    }
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard';
                    }, 1000);
                } else {
                    messageDiv.textContent = result.error || 'Invalid email or password';
                    messageDiv.className = 'message error';
                    console.error('Login failed:', result);
                    loginSubmit.textContent = originalText;
                    loginSubmit.disabled = false;
                }
                
            } catch (error) {
                messageDiv.textContent = 'Network error. Please check your connection and try again.';
                messageDiv.className = 'message error';
                console.error('Network error:', error);
                loginSubmit.textContent = originalText;
                loginSubmit.disabled = false;
            }
        });
        
        // Clear message when user starts typing
        const inputs = loginForm.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                messageDiv.style.display = 'none';
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            });
        });
    </script>
    <script src="/js/nav.js"></script>
</body>
</html>
