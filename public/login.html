<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Legal Spectrum</title>
    <meta name="description" content="Secure Legal Spectrum admin login for managing content and client communications.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f1b24">
    <link rel="icon" type="image/svg+xml" href="/uploads/img/legal-specturm.svg">
    <link rel="apple-touch-icon" href="/uploads/img/Legal-specturm-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body data-page="login" data-site-url="https://www.legalspectrum.ng" data-org-name="Legal Spectrum" data-org-phone="+2348061234567" data-org-email="hello@legalspectrum.ng" data-org-street="Legal Spectrum Chambers" data-org-locality="Okitipupa" data-org-region="Ondo State" data-org-country="NG">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <header>
        <div class="container nav-container">
            <a href="/" class="logo">
                <img src="/uploads/img/Legal-specturm-logo.png" alt="Legal Spectrum logo">
                <span>Legal Spectrum</span>
            </a>
            <button class="hamburger" type="button" aria-label="Toggle navigation" aria-controls="primary-nav" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav id="primary-nav" aria-label="Primary">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/#practice">Practice Areas</a></li>
                    <li><a href="/blog">Insights</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
                <a class="nav-cta" href="/contact">Book a Consultation</a>
            </nav>
        </div>
    </header>

    <main class="login-container" id="main-content">
        <div class="container">
            <div class="login-box">
                <div class="login-header">
                    <h1>Admin Sign In</h1>
                    <p>Manage insights, messages, and client updates.</p>
                </div>
                
                <div id="login-message" class="message" role="status" aria-live="polite"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email address">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" required placeholder="Enter your password">
                            <button type="button" class="toggle-password" id="toggle-password">Show</button>
                        </div>
                    </div>
                    
                    <button type="submit" id="login-submit">Sign In</button>
                </form>
                <div class="login-helper">
                    <a href="/admin/forgot-password" class="login-link">Forgot Password?</a>
                </div>
                <div class="back-link">
                    <a href="/">Back to Website</a>
                </div>
            </div>
        </div>
    </main>

    <div data-include="footer"></div>

    
    <script src="/js/bundle.js"></script>
</body>
</html>
