<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Legal Spectrum</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            color: #000000;
            background-color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            background-color: #FFFFFF;
            border-bottom: 1px solid #eee;
            padding: 2rem 0;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
            color: #000000;
            display: block;
            text-align: center;
        }
        
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 0;
        }
        
        .login-box {
            width: 100%;
            max-width: 500px;
            padding: 3rem;
            border: 1px solid #eee;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .login-box:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .login-header h1 {
            font-size: 2.2rem;
            font-weight: normal;
            margin-bottom: 1rem;
        }
        
        .login-header p {
            color: #666;
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 2rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.75rem;
            font-size: 1rem;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 1rem;
            border: 1px solid #ddd;
            font-family: 'Georgia', serif;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
        }
        
        .password-container {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #666;
            padding: 0.5rem;
        }
        
        .toggle-password:hover {
            color: #000000;
        }
        
        button[type="submit"] {
            width: 100%;
            background: #000000;
            color: #FFFFFF;
            border: 2px solid #000000;
            padding: 1.1rem;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        button[type="submit"]:hover {
            background: #FFFFFF;
            color: #000000;
        }
        
        button[type="submit"]:active {
            transform: translateY(1px);
        }
        
        button[type="submit"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            display: none;
            text-align: center;
        }
        
        .success {
            background-color: #f0f9f0;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        
        .error {
            background-color: #f8f9fa;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        
        footer {
            background-color: #000000;
            color: #FFFFFF;
            padding: 2.5rem 0;
            margin-top: auto;
        }
        
        .copyright {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
        }
        
        .back-link {
            text-align: center;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
        }
        
        .back-link a {
            color: #000000;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .back-link a:hover {
            border-color: #000000;
            background-color: #f9f9f9;
        }
        
        
        
        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                padding: 1.5rem 0;
            }
            
            .logo {
                font-size: 1.6rem;
            }
            
            .login-container {
                padding: 1.5rem 0;
            }
            
            .login-box {
                max-width: 100%;
                padding: 2rem;
                margin: 0 1rem;
                box-shadow: none;
                border: 1px solid #eee;
            }
            
            .login-header h1 {
                font-size: 1.8rem;
            }
            
            input {
                padding: 0.875rem;
                font-size: 1rem;
            }
            
            button[type="submit"] {
                padding: 1rem;
                font-size: 1rem;
            }
            
            .form-group {
                margin-bottom: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .login-box {
                padding: 1.5rem;
            }
            
            .login-header {
                margin-bottom: 2rem;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
            
            .login-header p {
                font-size: 0.9rem;
            }
            
            input {
                padding: 0.75rem;
                font-size: 0.95rem;
            }
            
            button[type="submit"] {
                padding: 0.875rem;
                font-size: 0.95rem;
            }
            
            .message {
                padding: 1rem;
                font-size: 0.9rem;
            }
            
            .back-link a {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
        
        
        @media (min-width: 769px) and (max-width: 1024px) {
            .login-box {
                max-width: 450px;
                padding: 2.5rem;
            }
        }
        
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message {
            animation: fadeIn 0.3s ease;
        }
    </style>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Legal Spectrum</a>
        </div>
    </header>

    <main class="login-container">
        <div class="container">
            <div class="login-box">
                <div class="login-header">
                    <h1>Admin Login</h1>
                    <p>Access the admin dashboard to manage content</p>
                </div>
                
                <div id="login-message" class="message"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email address">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" required placeholder="Enter your password">
                            <button type="button" class="toggle-password" id="toggle-password">Show</button>
                        </div>
                    </div>
                    
                    <button type="submit" id="login-submit">Sign In</button>
                </form>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/admin/forgot-password" style="color: #000000; text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
                <div class="back-link">
                    <a href="/"> Back to Website</a>
                </div>
            </div>
        </div>
    </div>
    </main>

    <footer>
        <div class="container">
            <div class="copyright">
                <p>&copy; 2026 Legal Spectrum. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Toggle password visibility
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                this.textContent = 'Show';
            }
        });
        
        // Login form handler
        const loginForm = document.getElementById('login-form');
        const loginSubmit = document.getElementById('login-submit');
        const messageDiv = document.getElementById('login-message');
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const originalText = loginSubmit.textContent;
            loginSubmit.textContent = 'Signing in...';
            loginSubmit.disabled = true;
            
            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                console.log('Login response:', { status: response.status, result });
                
                if (response.ok) {
                    messageDiv.textContent = 'Login successful! Redirecting...';
                    messageDiv.className = 'message success';
                    
                    // Store token in localStorage
                    if (result.token) {
                        localStorage.setItem('admin_token', result.token);
                        console.log('Token stored in localStorage');
                    }
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard';
                    }, 1000);
                } else {
                    messageDiv.textContent = result.error || 'Invalid email or password';
                    messageDiv.className = 'message error';
                    console.error('Login failed:', result);
                    loginSubmit.textContent = originalText;
                    loginSubmit.disabled = false;
                }
                
            } catch (error) {
                messageDiv.textContent = 'Network error. Please check your connection and try again.';
                messageDiv.className = 'message error';
                console.error('Network error:', error);
                loginSubmit.textContent = originalText;
                loginSubmit.disabled = false;
            }
        });
        
        // Clear message when user starts typing
        const inputs = loginForm.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                messageDiv.style.display = 'none';
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            });
        });
    </script>
</body>
</html>
